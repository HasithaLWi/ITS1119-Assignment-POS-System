<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>POS System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="user-page d-flex justify-content-center align-items-center h-100vh">
    <div class="bg-light d-flex  flex-column position-absolute 
        top-50 start-50 translate-middle rounded-5 border border-2 border-warning p-4"
      style="height: 75vh; width: 75vw; transform: translateY(-50%); overflow-y: scroll;">
      <h1 class="user-pop-up-title col-form-label position-absolute top-0 ms-1">User Management</h1>
      <hr class="w-100 border border-2 border-dark-subtle">
      <div class="user-details w-100">
        <div
          class="user-details-header">
          <p >User Details</p>
        </div>
        <div class="user-details-body d-flex flex-column align-items-center justify-content-center h-100">
          <div class="user-details-body-content d-flex flex-wrap flex-fill align-items-center justify-content-center h-100">
            <div class="user-detail-box user-name-box">
              <label for="user-name" class="col-form-label">Name:</label>
              <input type="text" class="form-control" id="user-name" placeholder="Enter user name">
            </div>
            <div class="user-detail-box user-email-box mt-3">
              <label for="user-email" class="col-form-label">Email:</label>
              <input type="email" class="form-control" id="user-email" placeholder="Enter user email">
            </div>
            <div class="user-detail-box user-role-box mt-3">
              <label for="user-role" class="col-form-label">Role:</label>
              <select class="form-select" id="user-role">
                <option value="" disabled selected>Select user role</option>
                <option value="admin">Admin</option>
                <option value="cashier">Cashier</option>
                <option value="manager">Manager</option>
              </select>
            </div>
            <div class="user-detail-box user-password-box mt-3">
              <label for="user-password" class="col-form-label">Password:</label>
              <input type="password" class="form-control" id="user-password" placeholder="Enter user password">
            </div>
            <div class="user-detail-box user-confirm-password-box mt-3">
              <label for="user-confirm-password" class="col-form-label">Confirm Password:</label>
              <input type="password" class="form-control" id="user-confirm-password"
                placeholder="Confirm user password">
            </div>
            <div class="user-detail-box user-username-box mt-3">
              <label for="user-username" class="col-form-label">Username:</label>
              <input type="text" class="form-control" id="user-username" placeholder="Enter user username">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
</body>

</html>
