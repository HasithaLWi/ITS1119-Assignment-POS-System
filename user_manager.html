<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>POS System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous">
  <!-- <link rel="stylesheet" href="css/style.css"> -->
  <link rel="stylesheet" href="css/user.css">
</head>

<body>
  <div class="user-page d-flex justify-content-center align-items-center min-vh-100 py-4">
    <div class="user-modal position-relative d-flex flex-column">

      <!-- Close Button -->
      <span class="close-btn"
        onclick="if(window.parent && window.parent.closeUserManager) window.parent.closeUserManager();">&times;</span>

      <!-- Header -->
      <h2 class="page-title" style="padding: 32px 32px 0;">User Manager</h2>

      <div class="scroll-container">

        <!-- Search bar -->
        <div class="search-box">
          <input type="text" class="input-field user-search-box" placeholder="Search ...">
        </div>

        <!-- User Details Section -->
        <form class="form-card" novalidate>
          <div class="form-card-header">
            <h3>User Details</h3>
          </div>
          <div class="form-card-field">
            <div class="input-box">
              <label class="input-field-labels">User ID:</label>
              <input type="text" class="input-field" readonly>
            </div>
            <div class="input-box">
              <label class="input-field-labels">User Name:</label>
              <input type="text" class="input-field">
            </div>
            <div class="input-box">
              <label class="input-field-labels">Address:</label>
              <input type="text" class="input-field">
            </div>
            <div class="input-box">
              <label class="input-field-labels">Phone:</label>
              <input type="text" class="input-field">
            </div>
            <div class="input-box">
              <label class="input-field-labels">Username:</label>
              <input type="text" class="input-field">
            </div>
            <div class="input-box">
              <label class="input-field-labels">Password:</label>
              <input type="password" class="input-field">
            </div>
            <div class="input-box">
              <label class="input-field-labels">Role:</label>
              <select class="input-field" required>
                <option value="">Select Role</option>
                <option value="Cashier">Cashier</option>
                <option value="Manager">Manager</option>
                <option value="Admin">Admin</option>
              </select>
            </div>
          </div>
          <div class="manage-buttons user-manage-btns">
            <button type="button" class="buttons btn btn-outline-success">Save</button>
            <button type="button" class="buttons btn btn-outline-primary">Update</button>
            <button type="button" class="buttons btn btn-outline-warning">Reset</button>
          </div>
        </form>

        <!-- Users Table -->
        <div class="table-container">
          <h3 class="table-header">Users</h3>
          <div style="overflow-x: auto; width: 100%;">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Role</th>
                  <th>Address</th>
                  <th>Phone</th>
                  <th>Username</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>UID-001</td>
                  <td>John</td>
                  <td>Admin</td>
                  <td>Galle</td>
                  <td>0784561233</td>
                  <td>user</td>
                  <td><button class="btn-delete">Delete</button></td>
                </tr>
                <tr>
                  <td>UID-001</td>
                  <td>John</td>
                  <td>Admin</td>
                  <td>Galle</td>
                  <td>0784561233</td>
                  <td>user</td>
                  <td><button class="btn-delete">Delete</button></td>
                </tr>
                <tr>
                  <td>UID-001</td>
                  <td>John</td>
                  <td>Admin</td>
                  <td>Galle</td>
                  <td>0784561233</td>
                  <td>user</td>
                  <td><button class="btn-delete">Delete</button></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

  <script type="module" src="controller/userController.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>
</body>

</html>
